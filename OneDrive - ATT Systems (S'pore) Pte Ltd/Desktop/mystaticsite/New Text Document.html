<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catch • Dot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100dvh;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      color: #e0e0ff;
      font-family: system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: none;
    }

    .container {
      text-align: center;
      position: relative;
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: clamp(2.8rem, 9vw, 6rem);
      font-weight: 100;
      letter-spacing: -0.05em;
      opacity: 0.9;
      margin-bottom: 0.4rem;
      user-select: none;
      pointer-events: none;
    }

    .score {
      font-size: clamp(1.3rem, 5vw, 2.4rem);
      font-weight: 300;
      opacity: 0.7;
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
      user-select: none;
      pointer-events: none;
    }

    .target {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #ff6bff, #7b00ff 60%, transparent 80%);
      border-radius: 50%;
      position: absolute;
      translate: -50% -50%;
      box-shadow: 
        0 0 40px #ff6bff80,
        0 0 80px #7b00ff60,
        inset 0 0 30px #ffffff30;
      pointer-events: all;
      cursor: none;
      transition: all 0.13s ease-out;
      scale: 0.92;
    }

    .target:hover {
      scale: 1.15;
      box-shadow: 
        0 0 70px #ff6bffff,
        0 0 140px #7b00ffff,
        inset 0 0 40px #ffffff60;
    }

    .target:active {
      scale: 0.68;
      transition: all 0.08s ease-out;
    }

    .instructions {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      translate: -50% 0;
      font-size: 1rem;
      opacity: 0.5;
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
    }

    .custom-cursor {
      width: 36px;
      height: 36px;
      border: 2px solid #a5b4fc;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      translate: -50% -50%;
      transition: all 0.09s ease-out;
      mix-blend-mode: difference;
    }

    .custom-cursor.clicking {
      width: 24px;
      height: 24px;
      background: rgba(165, 180, 252, 0.7);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Catch • Dot</h1>
  <div class="score">clicks: <span id="score">0</span></div>

  <div class="target" id="target"></div>

  <div class="instructions">move mouse & click the glowing dot • try to get faster</div>
</div>

<div class="custom-cursor" id="cursor"></div>

<script>
// ────────────────────────────────────────────────
//   Tiny JS only for moving the dot & counting
// ────────────────────────────────────────────────

let score = 0;
const target = document.getElementById('target');
const scoreEl = document.getElementById('score');
const cursor = document.getElementById('cursor');

function randomPos() {
  const x = Math.random() * (window.innerWidth - 120) + 60;
  const y = Math.random() * (window.innerHeight - 180) + 90;
  target.style.left = x + 'px';
  target.style.top  = y + 'px';
}

target.addEventListener('click', () => {
  score++;
  scoreEl.textContent = score;
  randomPos();
});

// Move fancy cursor
window.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

window.addEventListener('mousedown', () => cursor.classList.add('clicking'));
window.addEventListener('mouseup',   () => cursor.classList.remove('clicking'));

// First position
randomPos();
</script>

</body>
</html>
