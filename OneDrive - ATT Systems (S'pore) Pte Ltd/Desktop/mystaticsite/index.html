<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Color • Reflex</title>
  <style>
    body {
      margin:0; height:100dvh; background:#0a0015; color:#f0e0ff;
      font-family:system-ui; display:grid; place-items:center; cursor:none;
    }
    #target {
      width:180px; height:180px; border-radius:50%; font-size:2.8rem; font-weight:bold;
      display:grid; place-items:center; transition:all 0.2s; user-select:none;
      box-shadow:0 0 60px currentColor;
    }
    #score { position:absolute; top:2rem; font-size:2rem; opacity:0.8; }
    #cursor {
      position:fixed; width:44px; height:44px; border:3px solid #c4b5fd;
      border-radius:50%; pointer-events:none; transform:translate(-50%,-50%);
      transition:0.1s; mix-blend-mode:difference;
    }
  </style>
</head>
<body>

<div id="score">Score: <span id="pts">0</span></div>
<div id="target">START</div>
<div id="cursor"></div>

<script>
const colors = ['red','lime','cyan','magenta','yellow','orange','violet','white'];
const names  = ['RED','GREEN','CYAN','MAGENTA','YELLOW','ORANGE','VIOLET','WHITE'];
let score = 0, active = false;
const target = document.getElementById('target');
const pts = document.getElementById('pts');
const cursor = document.getElementById('cursor');

function newRound() {
  const realColor = colors[Math.floor(Math.random()*colors.length)];
  const showName = names[Math.floor(Math.random()*names.length)];
  target.style.color = realColor;
  target.textContent = showName;
  active = (realColor.toUpperCase() === showName);
}

target.onclick = () => {
  if (active) {
    score++;
    pts.textContent = score;
    target.style.scale = '1.3';
    setTimeout(()=>target.style.scale='1', 120);
    newRound();
  } else if (score > 0) {
    score = 0;
    pts.textContent = 0;
    alert("Wrong color! Reset →");
  }
};

addEventListener('mousemove', e=>{
  cursor.style.left = e.clientX+'px';
  cursor.style.top  = e.clientY+'px';
});

newRound();
setInterval(newRound, 2200); // change every ~2.2s
</script>
</body>
</html>
