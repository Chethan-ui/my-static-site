<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bubble • Burst</title>
  <style>
    body {
      margin:0; height:100dvh; background:linear-gradient(to bottom,#0f0a2a,#1a0040 70%,#000);
      color:#d4d4ff; font-family:system-ui; overflow:hidden; cursor:none;
    }
    #ui {
      position:absolute; top:2rem; left:50%; translate:-50% 0;
      font-size:2rem; font-weight:300; display:flex; gap:3rem;
    }
    .bubble {
      position:absolute; border-radius:50%; pointer-events:all;
      background:radial-gradient(circle at 30% 30%,#a8e6cf,#60a5fa40);
      box-shadow:0 0 40px #60a5fa60, inset 0 2px 10px rgba(255,255,255,0.3);
      transition:transform 0.2s ease-out;
    }
    .bubble:hover { scale:1.1; box-shadow:0 0 60px #60a5fa; }
    .bubble.burst { scale:0; }
    .cursor {
      position:fixed; width:36px; height:36px; border:2px solid #a78bfa;
      border-radius:50%; pointer-events:none; z-index:99; translate:-50% -50%;
      transition:0.12s; mix-blend-mode:difference;
    }
    .cursor.clicking { scale:0.8; background:rgba(167,139,250,0.5); }
  </style>
</head>
<body>
  <div id="ui">
    Score: <span id="score">0</span>
    Combo: <span id="combo">1x</span>
  </div>
  <div class="cursor" id="cursor"></div>

<script>
let score = 0, combo = 1, lastPop = 0;
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const cursor = document.getElementById('cursor');
const bubbles = [];

function createBubble() {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.width = bubble.style.height = (20 + Math.random() * 60) + 'px';
  bubble.style.top = '100vh';
  bubble.onclick = (e) => {
    e.stopPropagation();
    const size = parseFloat(bubble.style.width);
    score += Math.floor(size * combo * 2);
    combo = Date.now() - lastPop < 1000 ? combo + 0.2 : 1;
    lastPop = Date.now();
    bubble.classList.add('burst');
    scoreEl.textContent = score;
    comboEl.textContent = (combo | 0) + 'x';
    setTimeout(()=>bubble.remove(), 200);
  };
  document.body.appendChild(bubble);
  bubbles.push({el: bubble, vy: 1 + Math.random() * 2});
}

function loop() {
  bubbles.forEach((b,i) => {
    b.el.style.top = (parseFloat(b.el.style.top) - b.vy) + 'vh';
    if (parseFloat(b.el.style.top) < -10) {
      b.el.remove();
      bubbles.splice(i,1);
      combo = 1;
      comboEl.textContent = '1x';
    }
  });
  requestAnimationFrame(loop);
}

setInterval(createBubble, 400);
addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
addEventListener('mousedown', ()=>cursor.classList.add('clicking'));
addEventListener('mouseup', ()=>cursor.classList.remove('clicking'));

loop();
</script>
</body>
</html>
